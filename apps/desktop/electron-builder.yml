appId: com.paytonlee.codexweb
productName: Codex Web
directories:
  output: ../../dist-desktop
files:
  - dist/**/*
  - bundle/server/**/*
  - package.json
extraResources:
  - from: bundle/web
    to: web
  - from: bundle/codex
    to: codex
asarUnpack:
  - bundle/server/**/*
  - node_modules/bindings/**/*
  - node_modules/better-sqlite3/**/*
  - node_modules/file-uri-to-path/**/*
win:
  signAndEditExecutable: false
  target:
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - x64
        - arm64
